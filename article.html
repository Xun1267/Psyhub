<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章阅读 - 考研手账</title>
    
    <!-- 字体引入 -->
    <!-- 霞鹜文楷 LXGW WenKai Screen -->
    <link rel="stylesheet" href="https://npm.elemecdn.com/lxgw-wenkai-screen-webfont/style.css" media="print" onload="this.media='all'">
    <!-- Google Fonts: Inter & Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-gist.min.css">
    
    <style>
        :root {
            /* 颜色变量 */
            --bg-paper: #f9f7f1; /* 米白色道林纸底色 */
            --text-ink: #2c3e50; /* 深蓝墨水色 */
            --text-secondary: #5d6d7e;
            --accent-red: #e74c3c; /* 批注红 */
            --accent-blue: #3498db; /* 标记蓝 */
            --accent-yellow: #f1c40f; /* 荧光笔黄 */
            --line-color: rgba(0,0,0,0.08);
            
            /* 字体变量 */
            --font-serif: "LXGW WenKai Screen", "Lora", serif;
            --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-hand: "LXGW WenKai Screen", cursive;
        }

        /* 全局样式 */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-paper);
            background-image: url('daolin_texture.svg');
            background-repeat: repeat;
            color: var(--text-ink);
            font-family: var(--font-serif);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 顶部导航栏 */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(249, 247, 241, 0.95);
            backdrop-filter: blur(5px);
            border-bottom: 2px solid var(--text-ink);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-hand);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-ink);
            text-decoration: none;
            position: relative;
        }
        
        /* 胶带装饰效果 */
        .logo::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            width: 40px;
            height: 15px;
            background: rgba(231, 76, 60, 0.2);
            transform: rotate(-15deg);
            z-index: -1;
        }

        .home-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.2s ease;
            background: rgba(0,0,0,0.03);
            border: 1px solid transparent;
        }

        .home-btn:hover {
            background: #fff;
            color: var(--text-ink);
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-color: rgba(0,0,0,0.05);
        }

        /* 主容器布局 */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 3rem;
            width: 100%;
        }

        /* 防止Grid Item被撑开 */
        main > * {
            min-width: 0;
        }

        /* 侧边栏（文章列表） */
        aside {
            position: sticky;
            top: 5rem;
            height: fit-content;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .article-card {
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px; /* 轻微圆角，模拟卡片 */
            padding: 1.25rem;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            /* 手绘边框效果 */
            border-bottom-left-radius: 2px 255px;
            border-bottom-right-radius: 225px 15px;
            border-top-left-radius: 255px 15px;
            border-top-right-radius: 15px 225px;
        }

        .article-card:hover {
            transform: translateY(-4px) rotate(0.5deg);
            box-shadow: 5px 8px 15px rgba(0,0,0,0.08);
        }

        .article-card.active {
            border-left: 4px solid var(--accent-red);
            background: rgba(249, 247, 241, 0.5);
            transform: translateX(5px);
        }

        .card-tag {
            position: absolute;
            top: -8px;
            right: 10px;
            background: var(--accent-yellow);
            padding: 2px 8px;
            font-size: 0.75rem;
            font-family: var(--font-sans);
            color: #555;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            transform: rotate(2deg);
            z-index: 10;
        }
        
        .card-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
        }

        .card-title {
            font-family: var(--font-hand);
            font-size: 1.1rem;
            margin: 0 0 0.5rem 0;
            font-weight: bold;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: var(--font-sans);
        }

        /* 文章详情区 */
        .content-area {
            background: #fff;
            padding: 3rem;
            min-height: 80vh;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            /* 纸张边缘效果 */
            border-radius: 2px;
        }

        /* 顶部装饰线 */
        .content-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background-image: repeating-linear-gradient(to right, var(--text-secondary) 0, var(--text-secondary) 4px, transparent 4px, transparent 8px);
            opacity: 0.3;
        }

        /* Markdown 内容样式 */
        .markdown-body {
            font-family: var(--font-serif);
            color: var(--text-ink);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .markdown-body.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-family: var(--font-hand);
            color: var(--text-ink);
            margin-top: 2em;
            margin-bottom: 1em;
            position: relative;
        }
        
        .markdown-body h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background: var(--accent-red);
            opacity: 0.3;
            margin-top: 4px;
            border-radius: 2px;
        }

        .markdown-body p {
            margin-bottom: 1.5em;
            text-align: justify;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .markdown-body strong {
            background: linear-gradient(to bottom, transparent 60%, rgba(241, 196, 15, 0.3) 60%);
            padding: 0 2px;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(52, 152, 219, 0.05);
            margin: 1.5em 0;
            padding: 1em 1.5em;
            font-style: italic;
            color: var(--text-secondary);
            border-radius: 0 8px 8px 0;
        }
        
        .markdown-body ul {
            padding-left: 1.5em;
        }
        
        .markdown-body li {
            margin-bottom: 0.5em;
        }
        
        .markdown-body li::marker {
            color: var(--accent-red);
            font-family: var(--font-hand);
        }
        
        /* 图片自适应 */
        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 响应式设计 */
        @media (max-width: 850px) {
            main {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            aside {
                position: relative;
                top: 0;
            }
            
            .card-list {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 1rem;
                scroll-snap-type: x mandatory;
                width: 100%;
                /* 隐藏滚动条但保留功能 */
                scrollbar-width: none;
                -ms-overflow-style: none;
            }
            
            .card-list::-webkit-scrollbar {
                display: none;
            }
            
            .article-card {
                min-width: 260px;
                scroll-snap-align: start;
            }
            
            .content-area {
                padding: 1.5rem;
                width: 100%;
                overflow-x: hidden;
            }
        }
        
        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 1rem;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-red);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="logo">Daily Study</a>
        
        <a href="index.html" class="home-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span style="margin-left: 6px; font-weight: 500;">首页</span>
        </a>
    </div>
</header>

<main>
    <aside>
        <div class="card-list">
            <div class="article-card" data-id="metacognition">
                <div class="card-tag">Metacognition</div>
                <h3 class="card-title">总论：学习到底是什么？</h3>
                <div class="card-meta">
                    <span>📅 2026.03.06</span>
                    <span style="margin-left: 10px;">⏱️ 10 min read</span>
                </div>
            </div>
            
            <div class="article-card" data-id="methodology">
                <div class="card-tag">Methodology</div>
                <h3 class="card-title">Vol 1. 笔记已死？抄笔记到底有没有用</h3>
                <div class="card-meta">
                    <span>📅 2026.03.06</span>
                    <span style="margin-left: 10px;">⏱️ 8 min read</span>
                </div>
            </div>
            
            <!-- 占位卡片 -->
            <div class="article-card" style="opacity: 0.6; cursor: default;">
                <div class="card-tag" style="background: #e0e0e0;">Coming Soon</div>
                <h3 class="card-title">待更新...</h3>
            </div>
        </div>
    </aside>

    <section id="detail-view" class="content-area">
        <div id="loading-state" style="text-align: center; color: var(--text-secondary); padding: 4rem; display: none;">
            <div class="spinner"></div>
            Loading content...
        </div>
        <div id="markdown-content" class="markdown-body">
            <!-- 内容将通过 JS 渲染 -->
        </div>
    </section>
</main>

<!-- 库引入 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- 引入文章数据 -->
<script src="articles_data.js"></script>

<script>
    // 初始化 Markdown 解析器
    marked.setOptions({
        breaks: true, // 支持 GitHub 风格的换行
        gfm: true
    });

    const contentDiv = document.getElementById('markdown-content');
    const loadingState = document.getElementById('loading-state');
    const cards = document.querySelectorAll('.article-card[data-id]');

    // 获取 URL 参数
    function getArticleId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id') || 'metacognition'; // 默认加载第一篇
    }

    // 渲染文章
    function renderArticle(id) {
        const data = articlesData[id];
        
        if (!data) {
            contentDiv.innerHTML = '<h2>Article not found</h2><p>Sorry, the requested article could not be found.</p>';
            contentDiv.classList.add('visible');
            return;
        }

        // 更新侧边栏激活状态
        cards.forEach(card => {
            card.classList.remove('active');
            if (card.dataset.id === id) card.classList.add('active');
        });

        // 更新网页标题
        document.title = `${data.title} - 考研手账`;

        // 平滑滚动到顶部（仅移动端需要特别注意，PC端通常在顶部）
        if (window.innerWidth <= 850) {
            const mainContent = document.getElementById('detail-view');
            mainContent.scrollIntoView({ behavior: 'smooth' });
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 渲染 Markdown
        // 先淡出
        contentDiv.classList.remove('visible');
        
        setTimeout(() => {
            // 模拟极短的加载时间，确保动画流畅
            contentDiv.innerHTML = marked.parse(data.content);
            hljs.highlightAll();
            
            // 淡入
            contentDiv.classList.add('visible');
        }, 300);
    }

    // 点击事件处理
    cards.forEach(card => {
        card.addEventListener('click', (e) => {
            const id = card.dataset.id;
            
            // 如果已经是当前文章，只需滚动到顶部
            const currentId = getArticleId();
            if (id === currentId) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }

            // 更新 URL 不刷新页面
            const newUrl = `?id=${id}`;
            window.history.pushState({id: id}, '', newUrl);
            
            renderArticle(id);
        });
    });

    // 处理浏览器后退/前进按钮
    window.addEventListener('popstate', (e) => {
        const id = getArticleId();
        renderArticle(id);
    });

    // 初始加载
    document.addEventListener('DOMContentLoaded', () => {
        renderArticle(getArticleId());
    });
</script>

</body>
</html>
