考试性质
心理学专业基础是为高等院校和科研院所招收心理学学术学位硕士研究生而设置的具有选拔性质的全国硕士研究生招生考试科目，其目的是科学、公平、有效地测试考生掌握心理学学科大学本科阶段专业基础知识、基本理论、基本方法的水平和分析问题、解决问题的能力。评价的标准是高等院校心理学学科优秀本科毕业生所能达到的及格或及格以上水平，以利于各高等院校和科研院所择优选拔，确保硕士研究生的招生质量。

考查目标 
心理学专业基础考试内容涵盖心理学导论、发展与教育心理学、实验心理学、心理统计与测量等学科基础课程。要求考生系统掌握上述心理学学科的基本理论、基本知识和基本方法，能够运用所学的基本理论、基本知识和基本方法分析和解决有关理论问题和实际问题。

考试形式和试卷结构 
一、试卷满分及考试时间
本试卷满分为300分，考试时间为180分钟。

二、答题方式
答题方式为闭卷、笔试。

三、试卷考查内容结构
心理学导论 约100分
发展与教育心理学 约70分
实验心理学 约60分
心理统计与测量 约70分

四、试卷题型结构
单项选择题 60小题，每小题2分，共120分
多项选择题 10小题，每小题4分，共40分
简答题 4小题，每小题10分，共40分
综合题 4小题，每小题25分，共100分

    <script>
        const classify = (line) => {
            const t = line.trim();
            const isBracket = /^\[.+\]$/.test(t);
            const isCnSection = /^[一二三四五六七八九十]+\s*、/.test(t);
            const isParen = /^（[一二三四五六七八九十]+）/.test(t);
            const isNumeric = /^\d+[\.．]/.test(t);
            // 顶层：总体章节
            const topTitles = new Set([
                '考试性质','考查目标','考试形式和试卷结构','考查内容'
            ]);
            // 子层：学科与统计测量的模块，以及“一、…”章标题
            const subTitles = new Set([
                '心理学导论','发展与教育心理学','实验心理学','心理统计与测量',
                '发展心理学','教育心理学',
                '描述统计','推断统计','心理测量理论','心理测验及其应用'
            ]);
            const isTopTitle = topTitles.has(t);
            const isSubTitle = subTitles.has(t);
            return { isBracket, isCnSection, isParen, isNumeric, isTopTitle, isSubTitle };
        };

        const renderAll = (container, raw) => {
            const lines = raw.split(/\r?\n/);
            const frag = document.createDocumentFragment();
            const pushSpacer = (h = 8) => {
                const s = document.createElement('div');
                s.style.height = `${h}px`;
                frag.appendChild(s);
            };
            let list = null;
            lines.forEach((rawLine) => {
                const line = rawLine;
                if (!line.trim()) {
                    if (list) {
                        frag.appendChild(list);
                        list = null;
                    }
                    pushSpacer(12);
                    return;
                }
                const { isBracket, isCnSection, isParen, isNumeric, isTopTitle, isSubTitle } = classify(line);
                if (!isNumeric && list) {
                    frag.appendChild(list);
                    list = null;
                }
                if (isBracket) {
                    const el = document.createElement('div');
                    el.className = 'syll-line inline-flex items-center text-xs font-bold text-slate-700 bg-white/70 border border-white rounded-full px-3 py-1 mt-2';
                    el.textContent = line.trim();
                    frag.appendChild(el);
                    return;
                }
                if (isTopTitle && !isCnSection && !isParen && !isNumeric) {
                    const el = document.createElement('h2');
                    el.className = 't-h2';
                    el.textContent = line.trim();
                    el.dataset.level = "2";
                    frag.appendChild(el);
                    return;
                }
                if (isSubTitle || isCnSection) {
                    const el = document.createElement('h3');
                    el.className = 't-h3';
                    el.textContent = line.trim();
                    el.dataset.level = "3";
                    frag.appendChild(el);
                    return;
                }
                if (isParen) {
                    const el = document.createElement('h4');
                    el.className = 't-h4';
                    el.textContent = line.trim();
                    el.dataset.level = "4";
                    frag.appendChild(el);
                    return;
                }
                if (isNumeric) {
                    if (!list) {
                        list = document.createElement('ul');
                        list.className = 't-ul';
                    }
                    const li = document.createElement('li');
                    li.className = 't-li';
                    li.textContent = line;
                    list.appendChild(li);
                    return;
                }
                const el = document.createElement('p');
                el.className = 't-paragraph';
                el.textContent = line;
                frag.appendChild(el);
            });
            if (list) {
                frag.appendChild(list);
                list = null;
            }
            container.innerHTML = '';
            container.appendChild(frag);
        };

        const buildNumberingAndToc = () => {
            const h2s = Array.from(document.querySelectorAll('#md-content h2.t-h2'));
            let i = 0;
            const tocFrag = document.createDocumentFragment();
            const tocNav = document.getElementById('toc');
            const makeAnchor = (text) => 'sec-' + btoa(unescape(encodeURIComponent(text))).replace(/[^A-Za-z0-9]/g,'').slice(0,16) + '-' + Math.random().toString(36).slice(2,6);
            h2s.forEach((h2) => {
                i++;
                const h2num = i.toString();
                const h2Anchor = makeAnchor(h2.textContent);
                h2.id = h2Anchor;
                h2.textContent = h2num + '. ' + h2.textContent;
                const li2 = document.createElement('li');
                li2.className = 't-li';
                const a2 = document.createElement('a');
                a2.href = '#' + h2Anchor;
                a2.textContent = h2.textContent;
                a2.style.textDecoration = 'none';
                a2.style.color = '#1f2937';
                li2.appendChild(a2);
                tocFrag.appendChild(li2);
                // 添加二级标题到目录（不编号）
                let el = h2.nextElementSibling;
                while (el && !el.matches('h2.t-h2')) {
                    if (el.matches('h3.t-h3')) {
                        const h3Anchor = makeAnchor(el.textContent);
                        el.id = h3Anchor;
                        const li3 = document.createElement('li');
                        li3.className = 't-li';
                        li3.style.marginLeft = '18px';
                        const a3 = document.createElement('a');
                        a3.href = '#' + h3Anchor;
                        a3.textContent = el.textContent;
                        a3.style.textDecoration = 'none';
                        a3.style.color = '#374151';
                        li3.appendChild(a3);
                        tocFrag.appendChild(li3);
                        // 三级标题（不编号）
                        let inner = el.nextElementSibling;
                        while (inner && !inner.matches('h3.t-h3') && !inner.matches('h2.t-h2')) {
                            if (inner.matches('h4.t-h4')) {
                                const h4Anchor = makeAnchor(inner.textContent);
                                inner.id = h4Anchor;
                                const li4 = document.createElement('li');
                                li4.className = 't-li';
                                li4.style.marginLeft = '36px';
                                const a4 = document.createElement('a');
                                a4.href = '#' + h4Anchor;
                                a4.textContent = inner.textContent;
                                a4.style.textDecoration = 'none';
                                a4.style.color = '#4b5563';
                                li4.appendChild(a4);
                                tocFrag.appendChild(li4);
                            }
                            inner = inner.nextElementSibling;
                        }
                    }
                    el = el.nextElementSibling;
                }
            });
            tocNav.innerHTML = '';
            tocNav.appendChild(tocFrag);
        };

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('md-content');
            const text = document.getElementById('syllabus-md')?.textContent ?? '';
            renderAll(container, text);
            buildNumberingAndToc();
        });
    </script>
